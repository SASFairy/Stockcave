services:
  stockcave-dev:
    image: node:20-alpine
    container_name: stockcave-dev
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - NODE_ENV=development
      # Force polling on file-watching to guarantee instant Windows host volume hot-reloading
      - WATCHPACK_POLLING=true
    # Install SQLite-required OpenSSL libraries for Prisma query engine, then run npm install & dev server
    command: sh -c "apk add --no-cache openssl libc6-compat && npm install && npx prisma generate && npm run dev"
